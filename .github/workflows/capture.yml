name: Capture OVS Evidence

# Produces REAL ping_results.txt and verification_flows.json on GitHub's Linux runner.
# No Multipass needed. Push this repo to GitHub → Actions → Run workflow → download artifacts.

on:
  workflow_dispatch:
  push:
    branches: [main, master, assignment-2]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      VMI_WAIT_TIMEOUT: "1800"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk
        run: df -h && docker system df || true

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - name: Cache KubeVirt image archive
        uses: actions/cache@v4
        with:
          path: /tmp/kubevirt-images.tar
          key: kubevirt-images-v1.8.4-${{ hashFiles('cluster_setup.sh') }}

      - name: Show disk after cleanup
        run: df -h && docker system df || true

      - name: Install expect (for VM↔VM console pings)
        run: sudo apt-get update -qq && sudo apt-get install -y expect

      - name: Run cluster_setup.sh
        run: |
          chmod +x cluster_setup.sh verify_datapath.sh flows_to_json.py
          ./cluster_setup.sh

      - name: Verify artifacts
        run: |
          test -f ping_results.txt
          test -f verification_flows.json
          test -d evidence
          test -f evidence/flows_raw.txt
          test -f evidence/execution_mode.txt
          n=$(grep -c '0% packet loss' ping_results.txt); echo "ping 0%-loss blocks: $n"; [ "$n" -ge 4 ]
          python3 -c "import json; d=json.load(open('verification_flows.json')); assert d['flows'] and d['fdb']"
          # Assert classifier rules actually fired (nw_src= rules must have n_packets > 0)
          python3 -c "
import json, sys
d = json.load(open('verification_flows.json'))
classifier = [f for f in d['flows'] if 'nw_src' in f.get('match','')]
if not classifier:
    sys.exit('ERROR: no nw_src= classifier rules found in flows')
zero = [f for f in classifier if f.get('n_packets',0) == 0]
if zero:
    sys.exit(f'ERROR: classifier rules with n_packets=0: {[f[\"match\"] for f in zero]}')
print('classifier rules OK:', [(f[\"match\"], f[\"n_packets\"]) for f in classifier])
"
          # Confirm the raw-text evidence is a valid input to the standalone parser.
          python3 flows_to_json.py --bundle evidence --bridge br1 > /tmp/roundtrip.json
          python3 -c "import json; d=json.load(open('/tmp/roundtrip.json')); assert d['flows'] and d['fdb'] and d['datapath_flows']"
          # B3: print n_packets per classifier rule so every run shows flow-hit evidence
          echo "=== flow-hit summary (n_packets per nw_src= classifier rule) ==="
          python3 -c "
          import json
          d = json.load(open('verification_flows.json'))
          classifier = [f for f in d['flows'] if 'nw_src' in f.get('match','') or 'arp' in f.get('match','')]
          for f in classifier:
              print(f'  {f[\"match\"]:<30s}  n_packets={f[\"n_packets\"]}')
          print(f'  datapath_flows: {len(d[\"datapath_flows\"])}   fdb_entries: {len(d[\"fdb\"])}')
          "

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: ovs-evidence
          path: |
            ping_results.txt
            verification_flows.json
            evidence/
